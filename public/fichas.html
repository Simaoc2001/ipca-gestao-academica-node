<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fichas - IPCA Gestão Académica</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/estilos.css">
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark sticky-top">
        <div class="container-fluid">
            <a class="navbar-brand" href="/dashboard">
                <i class="fas fa-graduation-cap"></i> IPCA
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="/dashboard">Dashboard</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/cursos">Cursos</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/disciplinas">Disciplinas</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/alunos">Alunos</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/pautas">Pautas</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link btn btn-danger ms-2" href="/api/logout">
                            <i class="fas fa-sign-out-alt"></i> Sair
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="dashboard-container">
        <div class="container-fluid">
            <h1 class="mb-4"><i class="fas fa-file-alt"></i> Gestão de Fichas de Aluno</h1>

            <div class="card">
                <div class="card-body">
                    <div class="table-container">
                        <div class="table-responsive">
                            <table class="table table-hover" id="tabelaFichas">
                            <thead>
                                <tr>
                                    <th>Aluno</th>
                                    <th>Email</th>
                                    <th>Curso</th>
                                    <th>Estado</th>
                                    <th>Data Submissão</th>
                                    <th>Ações</th>
                                </tr>
                            </thead>
                            <tbody>
                            </tbody>
                        </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer>
        <div class="container-fluid">
            <p>&copy; 2024 IPCA - Instituto Politécnico do Cávado e do Ave. Todos os direitos reservados.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        async function carregarFichas() {
            try {
                const response = await fetch('/api/alunos');
                const fichas = await response.json();
                const tbody = document.querySelector('#tabelaFichas tbody');
                tbody.innerHTML = '';

                fichas.forEach(ficha => {
                    const data = ficha.matriculadoEm ? new Date(ficha.matriculadoEm).toLocaleDateString('pt-PT') : '-';
                    const row = `
                        <tr>
                            <td>${ficha.nome || '-'}</td>
                            <td>${ficha.email || '-'}</td>
                            <td>${ficha.curso_id || '-'}</td>
                            <td>
                                <span class="badge ${ficha.ativo ? 'bg-success' : 'bg-danger'}">
                                    ${ficha.ativo ? 'Matriculado' : 'Inativo'}
                                </span>
                            </td>
                            <td>${data}</td>
                            <td>
                                <button class="btn btn-sm btn-primary">
                                    <i class="fas fa-eye"></i>
                                </button>
                                <button class="btn btn-sm btn-warning">
                                    <i class="fas fa-edit"></i>
                                </button>
                            </td>
                        </tr>
                    `;
                    tbody.innerHTML += row;
                });
            } catch (err) {
                console.error('Erro ao carregar fichas:', err);
            }
        }

        carregarFichas();
    </script>
</body>
</html>
