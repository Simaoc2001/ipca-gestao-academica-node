<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerir Utilizadores - IPCA Gestão Académica</title>
    <link rel="stylesheet" href="/estilos.css">
    <style>
        .admin-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }

        .admin-title {
            font-size: 1.8rem;
            margin-bottom: 2rem;
            color: var(--primary-color);
            font-weight: 700;
        }

        .admin-content {
            background: white;
            padding: 2.5rem;
            border-radius: 8px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
        }

        .btn-group {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .btn {
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 6px;
            background-color: var(--primary-color);
            color: white;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .btn:hover {
            background-color: #0d47a1;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(15, 23, 42, 0.3);
        }

        .btn-secondary {
            background-color: #6c757d;
        }

        .btn-secondary:hover {
            background-color: #5a6268;
        }

        .users-table {
            width: 100%;
            border-collapse: collapse;
        }

        .users-table th {
            background-color: var(--primary-color);
            color: white;
            padding: 1rem;
            text-align: left;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.85rem;
        }

        .users-table td {
            padding: 1.2rem 1rem;
            border-bottom: 1px solid #e0e0e0;
        }

        .users-table tbody tr:hover {
            background-color: #f5f5f5;
        }

        .users-table tbody tr:last-child td {
            border-bottom: none;
        }

        .role-badge {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            border-radius: 12px;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .role-admin {
            background-color: #e3f2fd;
            color: #1976d2;
        }

        .role-funcionario {
            background-color: #f3e5f5;
            color: #7b1fa2;
        }

        .role-aluno {
            background-color: #e8f5e9;
            color: #388e3c;
        }

        .action-buttons {
            display: flex;
            gap: 0.5rem;
        }

        .btn-small {
            padding: 0.4rem 0.8rem;
            font-size: 0.85rem;
            background-color: #2196f3;
        }

        .btn-small:hover {
            background-color: #1976d2;
        }

        .btn-delete {
            background-color: #f44336;
        }

        .btn-delete:hover {
            background-color: #da190b;
        }
    </style>
</head>
<body>
    <banner class="header">
        <div class="header-content">
            <div class="logo">
                <div class="logo-circle">IP</div>
                <h1>IPCA <span class="header-title">Painel Administrativo</span></h1>
            </div>
            <nav class="nav-main">
                <a href="/admin/dashboard">Dashboard</a>
                <a href="/logout" class="nav-logout">Sair</a>
            </nav>
        </div>
    </banner>

    <div class="admin-container">
        <h2 class="admin-title">Gerir Utilizadores</h2>

        <div class="admin-content">
            <div class="btn-group">
                <button class="btn">+ Novo Utilizador</button>
            </div>

            <table class="users-table">
                <thead>
                    <tr>
                        <th>Utilizador</th>
                        <th>Nome</th>
                        <th>Email</th>
                        <th>Papel</th>
                        <th>Status</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody id="usersList">
                    <tr>
                        <td colspan="6" style="text-align: center; padding: 2rem;">
                            Carregando utilizadores...
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <footer class="footer">
        <p>© 2024 IPCA - Instituto Politécnico do Cávado e do Ave. Todos os direitos reservados.</p>
    </footer>

    <script>
        async function carregarUtilizadores() {
            try {
                const response = await fetch('/api/alunos');
                const usuarios = await response.json();

                const usersList = document.getElementById('usersList');

                if (!usuarios || usuarios.length === 0) {
                    usersList.innerHTML = '<tr><td colspan="6" style="text-align: center;">Nenhum utilizador registado</td></tr>';
                    return;
                }

                usersList.innerHTML = usuarios.map(user => `
                    <tr>
                        <td><strong>${user.login}</strong></td>
                        <td>${user.nome || 'N/A'}</td>
                        <td>${user.email || 'N/A'}</td>
                        <td>
                            <span class="role-badge role-${user.papel?.toLowerCase()}">
                                ${user.papel || 'N/A'}
                            </span>
                        </td>
                        <td>${user.ativo ? '✓ Ativo' : '✗ Inativo'}</td>
                        <td>
                            <div class="action-buttons">
                                <button class="btn-small">Editar</button>
                                <button class="btn-small btn-delete">Apagar</button>
                            </div>
                        </td>
                    </tr>
                `).join('');
            } catch (error) {
                console.error('Erro ao carregar utilizadores:', error);
                document.getElementById('usersList').innerHTML = '<tr><td colspan="6" style="text-align: center; color: #d32f2f;">Erro ao carregar dados</td></tr>';
            }
        }

        carregarUtilizadores();
    </script>
</body>
</html>
