<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerir Planos de Estudo - IPCA Gestão Académica</title>
    <link rel="stylesheet" href="/estilos.css">
    <style>
        .admin-container { max-width: 1000px; margin: 2rem auto; padding: 2rem; }
        .admin-title { font-size: 2rem; margin-bottom: 2rem; color: var(--primary-color); }
        .admin-content { background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1); }
        .btn-group { display: flex; gap: 1rem; margin-bottom: 2rem; }
        .btn { padding: 0.75rem 1.5rem; border: none; border-radius: 4px; background-color: var(--primary-color); color: white; cursor: pointer; font-weight: 600; }
        .message { text-align: center; padding: 2rem; color: #666; }
    </style>
</head>
<body>
    <banner class="header">
        <div class="header-content">
            <div class="logo">
                <div class="logo-circle">IP</div>
                <h1>IPCA <span class="header-title">Painel Administrativo</span></h1>
            </div>
            <nav class="nav-main">
                <a href="/admin/dashboard">Dashboard</a>
                <a href="/logout" class="nav-logout">Sair</a>
            </nav>
        </div>
    </banner>
    <div class="admin-container">
        <h2 class="admin-title">Planos de Estudo</h2>
        <div class="admin-content">
            <div class="btn-group">
                <button class="btn">+ Novo Plano</button>
            </div>
            <div class="message">
                <p>Gestão de planos de estudo - Selecione um curso para editar seu plano</p>
            </div>
        </div>
    </div>
    <footer class="footer">
        <p>© 2024 IPCA - Instituto Politécnico do Cávado e do Ave. Todos os direitos reservados.</p>
    </footer>
</body>
</html>
