<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pedidos de Matrícula - IPCA Gestão Académica</title>
    <link rel="stylesheet" href="/estilos.css">
    <style>
        .pedidos-container {
            max-width: 900px;
            margin: 2rem auto;
            padding: 2rem;
        }

        .pedidos-title {
            font-size: 2rem;
            margin-bottom: 2rem;
            color: var(--primary-color);
        }

        .pedidos-table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .pedidos-table thead {
            background-color: var(--primary-color);
            color: white;
        }

        .pedidos-table th {
            padding: 1rem;
            text-align: left;
            font-weight: 600;
        }

        .pedidos-table td {
            padding: 1rem;
            border-bottom: 1px solid #e0e0e0;
        }

        .pedidos-table tbody tr:last-child td {
            border-bottom: none;
        }

        .status-badge {
            display: inline-block;
            padding: 0.5rem 1rem;
            border-radius: 20px;
            font-weight: 600;
            font-size: 0.85rem;
        }

        .status-aprovado {
            background-color: #d4edda;
            color: #155724;
        }

        .status-pendente {
            background-color: #fff3cd;
            color: #856404;
        }

        .status-rejeitado {
            background-color: #f8d7da;
            color: #721c24;
        }

        .empty-state {
            text-align: center;
            padding: 3rem 2rem;
            color: #666;
        }

        .empty-state-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
        }
    </style>
</head>
<body>
    <banner class="header">
        <div class="header-content">
            <div class="logo">
                <div class="logo-circle">IP</div>
                <h1>IPCA <span class="header-title">Pedidos de Matrícula</span></h1>
            </div>
            <nav class="nav-main">
                <a href="/aluno/dashboard">Dashboard</a>
                <a href="/aluno/editar-ficha">Ficha</a>
                <a href="/aluno/pedidos-matricula" class="active">Pedidos</a>
                <a href="/aluno/notas">Notas</a>
                <a href="/logout" class="nav-logout">Sair</a>
            </nav>
        </div>
    </banner>

    <div class="pedidos-container">
        <h2 class="pedidos-title">Meus Pedidos de Matrícula</h2>
        
        <div id="pedidosContent">
            <table class="pedidos-table">
                <thead>
                    <tr>
                        <th>Disciplina</th>
                        <th>Curso</th>
                        <th>Status</th>
                        <th>Data de Pedido</th>
                    </tr>
                </thead>
                <tbody id="pedidosList">
                    <tr>
                        <td colspan="4" style="text-align: center; padding: 2rem;">
                            Carregando pedidos...
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <footer class="footer">
        <p>© 2024 IPCA - Instituto Politécnico do Cávado e do Ave. Todos os direitos reservados.</p>
    </footer>

    <script>
        async function carregarPedidos() {
            try {
                const response = await fetch('/api/aluno/pedidos-recentes?limit=100');
                const pedidos = await response.json();

                const pedidosList = document.getElementById('pedidosList');
                
                if (!pedidos || pedidos.length === 0) {
                    pedidosList.innerHTML = `
                        <tr>
                            <td colspan="4">
                                <div class="empty-state">
                                    <div class="empty-state-icon">📋</div>
                                    <p>Nenhum pedido de matrícula registado</p>
                                </div>
                            </td>
                        </tr>
                    `;
                    return;
                }

                pedidosList.innerHTML = pedidos.map(pedido => `
                    <tr>
                        <td>${pedido.disciplina_nome || 'N/A'}</td>
                        <td>${pedido.curso_nome || 'N/A'}</td>
                        <td>
                            <span class="status-badge status-${pedido.status?.toLowerCase() || 'pendente'}">
                                ${pedido.status || 'Pendente'}
                            </span>
                        </td>
                        <td>${new Date(pedido.data_pedido).toLocaleDateString('pt-PT')}</td>
                    </tr>
                `).join('');
            } catch (error) {
                console.error('Erro ao carregar pedidos:', error);
                document.getElementById('pedidosList').innerHTML = `
                    <tr>
                        <td colspan="4" style="text-align: center; color: #d32f2f;">
                            Erro ao carregar pedidos. Tente novamente.
                        </td>
                    </tr>
                `;
            }
        }

        carregarPedidos();
    </script>
</body>
</html>
